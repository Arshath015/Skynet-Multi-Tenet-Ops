services:
  postgres:
    image: postgres:16
    container_name: airman_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airman_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: airman_backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/airman_core
      JWT_SECRET: supersecret
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data: